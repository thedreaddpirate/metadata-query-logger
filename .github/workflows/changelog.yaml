name: '📝 Create/Update Release Draft & Release Bump PR'

on:
  push:
    branches:
      - master
    paths-ignore:
      - build.yaml
  workflow_dispatch:
  repository_dispatch:
    types:
      - update-prep-command

jobs:
  call:
    uses: thedreaddpirate/metadata-query-logger/.github/workflows/changelog.yaml@master
    with:
      repository-name: thedreaddpirate/metadata-query-logger
    secrets:
      token: ${{ secrets.JF_BOT_TOKEN }}
