name: '🔬 Run CodeQL'

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - '**/*.md'
  schedule:
    - cron: '24 2 * * 4'
  workflow_dispatch:

jobs:
  call:
    uses: thedreaddpirate/metadata-query-logger/.github/workflows/scan-codeql.yaml@master
    with:
      repository-name: thedreaddpirate/metadata-query-logger
